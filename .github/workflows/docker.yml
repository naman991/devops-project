name: CI Pipeline - Build & Push Docker Images

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build & Push Auth Service
      run: |
        cd auth-service
        docker build -t ${{ secrets.DOCKER_USERNAME }}/auth-service:latest .
        docker push ${{ secrets.DOCKER_USERNAME }}/auth-service:latest

    - name: Build & Push Product Service
      run: |
        cd product-service
        docker build -t ${{ secrets.DOCKER_USERNAME }}/product-service:latest .
        docker push ${{ secrets.DOCKER_USERNAME }}/product-service:latest
