jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build & Push Auth Service
      working-directory: ./auth-service
      run: |
        IMAGE=${{ secrets.DOCKER_USERNAME }}/auth-service:${{ github.sha }}
        docker build -t $IMAGE -t ${{ secrets.DOCKER_USERNAME }}/auth-service:latest .
        docker push $IMAGE
        docker push ${{ secrets.DOCKER_USERNAME }}/auth-service:latest

    - name: Build & Push Product Service
      working-directory: ./product-service
      run: |
        IMAGE=${{ secrets.DOCKER_USERNAME }}/product-service:${{ github.sha }}
        docker build -t $IMAGE -t ${{ secrets.DOCKER_USERNAME }}/product-service:latest .
        docker push $IMAGE
        docker push ${{ secrets.DOCKER_USERNAME }}/product-service:latest
